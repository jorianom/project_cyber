name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Configuration
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SOURCE_TAG: ${{ secrets.SOURCE_TAG }}
        run: |
          api_base="${API_BASE_URL:-https://project-cyber-inky.vercel.app}"
          source_tag="${SOURCE_TAG:-github-pages}"
          sed -i "s|API_BASE: \".*\"|API_BASE: \"${api_base}\"|" docs/index.html
          sed -i "s|SOURCE_TAG: \".*\"|SOURCE_TAG: \"${source_tag}\"|" docs/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
